name: TinyPlus
version: 1.0.0
main: com.tinyplus.TinyPlus
api-version: 1.21
author: YourName
description: TinyPlus Ultimate - уменьшение, анимации, перенос, сон с выбором поз

commands:
  smoll:
    description: Уменьшить игрока
    usage: /smoll <ник>
  unsmoll:
    description: Вернуть размер
    usage: /unsmoll [ник]
  carry:
    description: Взять маленького на руки
    usage: /carry <ник>
  pocket:
    description: Положить в карман
    usage: /pocket <ник>
  shoe:
    description: Засунуть в кроссовок
    usage: /shoe <ник>
  drop:
    description: Опустить
    usage: /drop
  sit:
    description: Сесть
    usage: /sit
  lie:
    description: Лечь
    usage: /lie
  stand:
    description: Встать
    usage: /stand
  anim:
    description: Анимация (1-погладить, 2-поцеловать, 3-подбросить)
    usage: /anim <ник> <1-3>
  pose:
    description: Выбрать позу для сна (1-5)
    usage: /pose <1-5>
  visible:
    description: Стать видимым
    usage: /visible

permissions:
  tinyplus.use:
    default: true
